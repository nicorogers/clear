<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clear — Less attention on money. More space for life.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EF;
    --ink: #1A1A18;
    --ink-muted: #6B6B63;
    --ink-faint: #AEADA6;
    --accent: #2D5A3D;
    --accent-light: #EAF1EC;
    --border: rgba(26,26,24,0.10);
    --max: 680px;
  }

  html { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.7; scroll-behavior: smooth; }

  nav {
    position: sticky; top: 0; z-index: 10;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); letter-spacing: -0.01em; }
  .lang-selector { display: flex; gap: 4px; }
  .lang-btn {
    padding: 5px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    border: 1px solid var(--border); border-radius: 100px;
    background: transparent; color: var(--ink-muted); cursor: pointer;
    transition: all 0.15s ease;
  }
  .lang-btn:hover { color: var(--ink); border-color: rgba(26,26,24,0.3); }
  .lang-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  section { max-width: var(--max); margin: 0 auto; padding: 88px 32px; }
  section + section { border-top: 1px solid var(--border); }

  .label {
    display: inline-block;
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-light);
    padding: 4px 10px; border-radius: 100px; margin-bottom: 28px;
  }

  .hero-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(34px, 6vw, 52px);
    line-height: 1.15; letter-spacing: -0.02em;
    color: var(--ink); margin-bottom: 24px;
    white-space: pre-line;
  }
  .hero-sub { font-size: 18px; font-weight: 300; color: var(--ink-muted); line-height: 1.65; margin-bottom: 40px; max-width: 520px; }
  .hero-cta {
    display: inline-block;
    padding: 13px 28px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: var(--accent); color: #fff;
    border: none; border-radius: 100px; cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .hero-cta:hover { opacity: 0.85; }

  .body-text { font-size: 16px; font-weight: 300; line-height: 1.8; color: var(--ink-muted); margin-bottom: 18px; }
  .body-text:last-child { margin-bottom: 0; }

  .step { display: flex; gap: 24px; margin-bottom: 40px; }
  .step:last-child { margin-bottom: 0; }
  .step-num { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink-faint); min-width: 32px; line-height: 1.2; }
  .step-content h3 { font-size: 16px; font-weight: 500; color: var(--ink); margin-bottom: 8px; }
  .step-content p { font-size: 15px; font-weight: 300; line-height: 1.75; color: var(--ink-muted); }

  .waitlist-box {
    background: #fff; border-radius: 16px; padding: 48px;
    border: 1px solid var(--border);
  }
  .waitlist-box .label { background: var(--accent-light); color: var(--accent); }
  .waitlist-note { font-size: 15px; font-weight: 300; color: var(--ink-muted); margin-bottom: 28px; line-height: 1.65; }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .input-grid .full { grid-column: 1 / -1; }

  .wl-input {
    width: 100%;
    padding: 12px 16px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border); border-radius: 100px;
    background: var(--cream); color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .wl-input::placeholder { color: var(--ink-faint); }
  .wl-input:focus { border-color: var(--accent); }
  .wl-input.error { border-color: #c53030; }

  .wl-submit {
    margin-top: 12px;
    padding: 12px 28px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    background: var(--accent); color: #fff;
    border: none; border-radius: 100px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .wl-submit:hover { opacity: 0.85; }
  .wl-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-msg { display: none; font-size: 15px; color: var(--accent); margin-top: 16px; font-weight: 500; }
  .error-msg { display: none; font-size: 14px; color: #c53030; margin-top: 12px; }

  footer {
    max-width: var(--max); margin: 0 auto;
    padding: 32px 32px 48px;
    border-top: 1px solid var(--border);
    font-size: 13px; font-weight: 300; color: var(--ink-faint);
  }

  @media (max-width: 480px) {
    nav { padding: 16px 20px; }
    section { padding: 64px 20px; }
    .waitlist-box { padding: 32px 24px; }
    .input-grid { grid-template-columns: 1fr; }
    .input-grid .full { grid-column: 1; }
    footer { padding: 28px 20px 40px; }
  }
</style>
</head>
<body>

<nav>
  <span class="brand">Clear</span>
  <div class="lang-selector">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('nl')">NL</button>
  </div>
</nav>

<section>
  <p class="label" id="hero-label"></p>
  <h1 class="hero-title" id="hero-title"></h1>
  <p class="hero-sub" id="hero-sub"></p>
  <button class="hero-cta" onclick="document.getElementById('waitlist').scrollIntoView({behavior:'smooth'})" id="hero-cta"></button>
</section>

<section>
  <p class="label" id="problem-label"></p>
  <p class="body-text" id="problem-1"></p>
  <p class="body-text" id="problem-2"></p>
</section>

<section>
  <p class="label" id="offer-label"></p>
  <p class="body-text" id="offer-1"></p>
  <p class="body-text" id="offer-2"></p>
</section>

<section>
  <p class="label" id="how-label"></p>
  <p class="body-text" id="how-intro" style="margin-bottom: 40px;"></p>
  <div class="step"><span class="step-num">1</span><div class="step-content"><h3 id="s1-title"></h3><p id="s1-body"></p></div></div>
  <div class="step"><span class="step-num">2</span><div class="step-content"><h3 id="s2-title"></h3><p id="s2-body"></p></div></div>
  <div class="step"><span class="step-num">3</span><div class="step-content"><h3 id="s3-title"></h3><p id="s3-body"></p></div></div>
  <div class="step"><span class="step-num">4</span><div class="step-content"><h3 id="s4-title"></h3><p id="s4-body"></p></div></div>
</section>

<section id="waitlist">
  <div class="waitlist-box">
    <p class="label" id="wl-label"></p>
    <p class="waitlist-note" id="wl-note"></p>
    <div class="input-grid">
      <input class="wl-input" type="text" id="first-name" />
      <input class="wl-input" type="text" id="last-name" />
      <input class="wl-input full" type="email" id="email-input" />
    </div>
    <button class="wl-submit" onclick="submitWaitlist()" id="wl-btn"></button>
    <p class="success-msg" id="success-msg"></p>
    <p class="error-msg" id="error-msg"></p>
  </div>
</section>

<footer id="footer-text"></footer>

<script>
const NOCODB_URL = 'https://app.nocodb.com/api/v3/data/p7mwttwzbenfetn/mnkbf1z4s8tr0s5/records';
const NOCODB_TOKEN = 'nc_pat_M4QlDGDqkqSVKDm_i-ReBly0dlK28AMBsepsRjM5';

const copy = {
  en: {
    heroLabel: "Financial clarity",
    heroTitle: "Less attention on money.\nMore space for life.",
    heroSub: "Join a growing community of people who know their money is working for them — without having to think about it.",
    heroCta: "Join the waitlist",
    problemLabel: "The problem",
    problem1: "Managing your finances feels like a part-time job nobody hired you for. Bank statements, receipts, spreadsheets, categories, budgets — it's exhausting before you even start.",
    problem2: "And when people do try, they either obsess over every euro or give up entirely. Most people don't lack discipline. They lack a system that works without them.",
    offerLabel: "What we offer",
    offer1: "We believe feeling at ease with money is not a destination. It's a process that never truly ends — but one that gets easier and easier. Life changes, priorities shift, but the process stays untouched while it handles these changes. What we build with you is not a solution. It's an environment where that process can thrive.",
    offer2: "We will introduce you to our process where our tools take you from financial chaos to complete clarity — step by step, at your pace. We start together, with personal guidance, and gradually hand control over to you. Ultimately, you will feel 100% certain that your money is spent the best way possible — without any effort on your part.",
    howLabel: "How it works",
    howIntro: "We offer six sessions of one hour each, spread over six months. That is the only time we ask of you.",
    s1Title: "We listen to your needs",
    s1Body: "We take time to understand your situation, your needs and what's been holding you back. We connect your accounts, introduce our app, and explain how the process works.",
    s2Title: "We share what we see",
    s2Body: "We present our first insights about your spending behaviour and what they reveal about how money moves through your life.",
    s3Title: "We explain the process",
    s3Body: "We go through your spending side by side — adjusting, adding or stopping budgets, and fine-tuning until it truly reflects how you want to live.",
    s4Title: "Continue on your own",
    s4Body: "We make sure you have everything you need to continue independently. One hour a month, and you'll always know your money is exactly where it should be.",
    wlLabel: "Join the waitlist",
    wlNote: "We're currently in an early phase and our capacity is limited. Leave your details and we'll reach out when a spot opens.",
    wlBtn: "Join waitlist",
    wlFirstName: "First name",
    wlLastName: "Last name",
    wlEmail: "your@email.com",
    wlSuccess: "You're on the list! We'll be in touch soon.",
    wlError: "Something went wrong. Please try again.",
    wlSending: "Sending...",
    footer: "© Clear — a project by WIS LIGO - Whatever it is, let it go."
  },
  nl: {
    heroLabel: "Financiële helderheid",
    heroTitle: "Minder aandacht voor geld.\nMeer ruimte voor het leven.",
    heroSub: "Sluit je aan bij een groeiende gemeenschap van mensen die weten dat hun geld voor hen werkt — zonder er voortdurend aan te denken.",
    heroCta: "Schrijf je in",
    problemLabel: "Het probleem",
    problem1: "Je financiën beheren voelt als een deeltijdjob waar niemand je voor heeft aangenomen. Bankafschriften, bonnetjes, spreadsheets, categorieën, budgetten — het is uitputtend nog voor je begint.",
    problem2: "En als mensen het toch proberen, obsesseren ze over elke euro of geven ze het volledig op. De meeste mensen missen geen discipline. Ze missen een systeem dat zonder hen werkt.",
    offerLabel: "Wat we aanbieden",
    offer1: "Wij geloven dat je goed voelen bij geld nooit een eindpunt is. Het is een proces dat nooit echt stopt — maar wel steeds eenvoudiger wordt. Het leven verandert, prioriteiten verschuiven, en het proces vangt dit op zonder te veranderen. Wat we samen met jou bouwen is geen oplossing. Het is een omgeving waarin dat proces kan gedijen.",
    offer2: "Wij begeleiden je stap voor stap van financiële chaos naar volledige helderheid — op jouw tempo. We beginnen samen, met persoonlijke begeleiding, en geven de controle geleidelijk aan jou over. Uiteindelijk voldoet het om sporadisch naar je financiën te kijken in een vertrouwde omgeving om te weten dat je je geld op de beste mogelijke manier uitgeeft.",
    howLabel: "Hoe het werkt",
    howIntro: "We bieden zes sessies van elk één uur, gespreid over zes maanden. Dat is de enige tijd die we van je vragen.",
    s1Title: "We luisteren naar jouw behoeften",
    s1Body: "We nemen de tijd om jouw situatie, behoeften en wat je tegenhoudt te begrijpen. We verbinden je accounts, introduceren onze app en leggen uit hoe het proces werkt.",
    s2Title: "We delen wat we zien",
    s2Body: "We presenteren onze eerste inzichten over jouw uitgavengedrag en wat ze onthullen over hoe geld door jouw leven stroomt.",
    s3Title: "We leggen het proces uit",
    s3Body: "We doorlopen je uitgaven zij aan zij — budgetten aanpassen, toevoegen of stopzetten, en verfijnen totdat het echt weerspiegelt hoe jij wilt leven.",
    s4Title: "Zelfstandig verder",
    s4Body: "We zorgen dat je alles hebt wat je nodig hebt om zelfstandig verder te gaan. Één uur per maand, en je weet altijd dat je geld precies goed uitgegeven wordt.",
    wlLabel: "Schrijf je in",
    wlNote: "We bevinden ons momenteel in een vroege fase en onze capaciteit is beperkt. Laat je gegevens achter en we nemen contact op wanneer er een plek vrijkomt.",
    wlBtn: "Inschrijven",
    wlFirstName: "Voornaam",
    wlLastName: "Achternaam",
    wlEmail: "jouw@email.com",
    wlSuccess: "Je staat op de lijst! We nemen snel contact op.",
    wlError: "Er is iets misgegaan. Probeer het opnieuw.",
    wlSending: "Bezig...",
    footer: "© Clear — een project van WIS LIGO - Whatever it is, let it go."
  }
};

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  const t = copy[lang];
  document.documentElement.lang = lang;
  document.getElementById('hero-label').innerText = t.heroLabel;
  document.getElementById('hero-title').innerText = t.heroTitle;
  document.getElementById('hero-sub').innerText = t.heroSub;
  document.getElementById('hero-cta').innerText = t.heroCta;
  document.getElementById('problem-label').innerText = t.problemLabel;
  document.getElementById('problem-1').innerText = t.problem1;
  document.getElementById('problem-2').innerText = t.problem2;
  document.getElementById('offer-label').innerText = t.offerLabel;
  document.getElementById('offer-1').innerText = t.offer1;
  document.getElementById('offer-2').innerText = t.offer2;
  document.getElementById('how-label').innerText = t.howLabel;
  document.getElementById('how-intro').innerText = t.howIntro;
  document.getElementById('s1-title').innerText = t.s1Title;
  document.getElementById('s1-body').innerText = t.s1Body;
  document.getElementById('s2-title').innerText = t.s2Title;
  document.getElementById('s2-body').innerText = t.s2Body;
  document.getElementById('s3-title').innerText = t.s3Title;
  document.getElementById('s3-body').innerText = t.s3Body;
  document.getElementById('s4-title').innerText = t.s4Title;
  document.getElementById('s4-body').innerText = t.s4Body;
  document.getElementById('wl-label').innerText = t.wlLabel;
  document.getElementById('wl-note').innerText = t.wlNote;
  document.getElementById('wl-btn').innerText = t.wlBtn;
  document.getElementById('first-name').placeholder = t.wlFirstName;
  document.getElementById('last-name').placeholder = t.wlLastName;
  document.getElementById('email-input').placeholder = t.wlEmail;
  document.getElementById('footer-text').innerText = t.footer;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('success-msg').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
}

async function submitWaitlist() {
  const t = copy[currentLang];
  const firstName = document.getElementById('first-name').value.trim();
  const lastName = document.getElementById('last-name').value.trim();
  const email = document.getElementById('email-input').value.trim();

  ['first-name', 'last-name', 'email-input'].forEach(id => {
    document.getElementById(id).classList.remove('error');
  });

  let valid = true;
  if (!firstName) { document.getElementById('first-name').classList.add('error'); valid = false; }
  if (!lastName) { document.getElementById('last-name').classList.add('error'); valid = false; }
  if (!email || !email.includes('@')) { document.getElementById('email-input').classList.add('error'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('wl-btn');
  btn.disabled = true;
  btn.innerText = t.wlSending;
  document.getElementById('success-msg').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  try {
    const response = await fetch(NOCODB_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'xc-token': NOCODB_TOKEN
      },
      body: JSON.stringify({
        'First name': firstName,
        'Last name': lastName,
        'Email': email
      })
    });

    if (response.ok) {
      document.getElementById('success-msg').innerText = t.wlSuccess;
      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('first-name').value = '';
      document.getElementById('last-name').value = '';
      document.getElementById('email-input').value = '';
    } else {
      throw new Error('API error');
    }
  } catch (e) {
    document.getElementById('error-msg').innerText = t.wlError;
    document.getElementById('error-msg').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerText = t.wlBtn;
  }
}

setLang('en');
</script>
</body>
</html>
